<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Launcher</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 80px 20px;
        }

        h1 {
            font-size: 3rem;
        }

        .button {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        section {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Atomic Launcher</h1>
    <p>Modern launcher and game management platform.</p>

    <a class="button"
       href="https://github.com/mironczuk-dar/Atomic-launcher">
       View on GitHub
    </a>
</header>

<section>
    <div class="card">
        <h2>Features</h2>
        <ul>
            <li>Game Library Management</li>
            <li>Store Integration</li>
            <li>User Profiles</li>
            <li>Achievement System</li>
            <li>Cross-platform Support</li>
        </ul>
    </div>

    <div class="card">
        <h2>About</h2>
        <p>
            Atomic Launcher is a game launcher project developed by
            Dariusz Mirończuk.
        </p>
    </div>
</section>

</body>
</html>
